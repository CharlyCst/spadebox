name: spadebox_agent_example
description: A Flutter app demonstrating a SpadeBox-powered local AI agent.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.9.0
  spadebox_dart:
    path: ../../dart
  http: ^1.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
