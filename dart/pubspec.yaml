name: spadebox_dart
description: Dart/Flutter bindings for SpadeBox — sandboxed AI agent tools.
version: 0.1.0
homepage: https://github.com/charlycst/spadebox

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter_rust_bridge: ^2.9.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
