name: CI
env:
  DEBUG: napi:*
  APP_NAME: spadebox
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  CARGO_INCREMENTAL: '1'
'on':
  workflow_dispatch: null
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Lint
        run: just lint

  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build-js: npx --yes --package @napi-rs/cli@3 napi build --platform --target x86_64-unknown-linux-gnu
          - host: macos-latest
            target: aarch64-apple-darwin
            build-js: npx --yes --package @napi-rs/cli@3 napi build --platform --target aarch64-apple-darwin
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build-js: npx --yes --package @napi-rs/cli@3 napi build --platform --target aarch64-unknown-linux-gnu
    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.14.1
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Build JS
        working-directory: js
        run: ${{ matrix.settings.build-js }}
        shell: bash
      - name: Upload JS artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            js/${{ env.APP_NAME }}.*.node
            js/${{ env.APP_NAME }}.*.wasm
          if-no-files-found: error
      - name: Build Python wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.settings.target }}
          args: --release --out dist
          manylinux: auto
          working-directory: python
      - name: Upload Python wheels
        uses: actions/upload-artifact@v7
        with:
          name: python-wheels-${{ matrix.settings.target }}
          path: python/dist
          if-no-files-found: error

  test:
    name: Test ${{ matrix.target }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    runs-on: ${{ contains(matrix.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Download JS artifact
        uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.target }}
          path: js
      - name: Download Python wheel
        uses: actions/download-artifact@v8
        with:
          name: python-wheels-${{ matrix.target }}
          path: python/dist
      - name: Install Python wheel
        working-directory: python
        run: |
          uv sync --no-install-project
          uv pip install --find-links dist spadebox
      - name: Cargo tests
        run: cargo test
      - name: JS tests
        working-directory: js
        run: deno check && deno task test
      - name: Python tests
        working-directory: python
        run: uv run --no-sync pytest test

  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    needs:
      - lint
      - test
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Create npm dirs
        working-directory: js
        run: npx --yes --package @napi-rs/cli@3 napi create-npm-dirs
      - name: Download JS artifacts
        uses: actions/download-artifact@v8
        with:
          path: js/artifacts
          pattern: bindings-*
      - name: Move JS artifacts
        working-directory: js
        run: npx --yes --package @napi-rs/cli@3 napi artifacts
      - name: List JS packages
        working-directory: js
        run: ls -R ./npm
        shell: bash
      - name: Publish JS to npm
        working-directory: js
        run: |
          npm config set provenance true
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
            npm publish --access public
            for pkg in ./npm/*/; do
              npm publish "$pkg" --access public
            done
          else
            echo "Not a tag release, skipping publish"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Download Python wheels
        uses: actions/download-artifact@v8
        with:
          path: python-dist
          pattern: python-wheels-*
          merge-multiple: true
      - name: Publish Python to PyPI
        if: github.ref_type == 'tag'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-dist/
